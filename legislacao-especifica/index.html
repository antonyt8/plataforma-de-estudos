<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legislação Específica - Mapas & Questões</title>
    <link rel="stylesheet" href="../assets/css/global.css" />
    <link rel="stylesheet" href="../assets/css/study.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="../assets/js/study-map-app.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 overflow-hidden h-screen flex">
    <button id="mobileOpenBtn" class="md:hidden fixed bottom-6 right-6 z-50 bg-purple-600 text-white p-4 rounded-full shadow-xl hover:bg-purple-700 transition-colors">
        <i class="fa-solid fa-bars text-xl"></i>
    </button>
    <aside id="sidebar" class="fixed md:static inset-y-0 left-0 z-40 w-72 bg-white border-r border-slate-200 flex flex-col transition-transform duration-300 ease-in-out shadow-2xl md:shadow-none -translate-x-full md:translate-x-0">
        <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-purple-900 text-white shrink-0">
            <div>
                <h1 class="text-xl font-bold flex items-center gap-2">
                    <i class="fa-solid fa-list text-purple-300"></i>
                    Legislação
                </h1>
                <p class="text-xs text-purple-200 mt-1 font-medium">Específica - Mapas & Questões</p>
            </div>
            <button id="mobileCloseBtn" class="md:hidden text-purple-200 hover:text-white">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>
        </div>
        <div class="p-4 border-b border-slate-100 shrink-0">
            <a href="../index.html" class="text-sm text-purple-600 hover:text-purple-800 font-semibold mb-3 inline-block">
                <i class="fa-solid fa-arrow-left"></i> Voltar
            </a>
            <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" id="searchInput" placeholder="Procurar assunto..." class="w-full pl-9 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-purple-500 focus:bg-white transition-colors">
            </div>
        </div>
        <div class="flex-1 overflow-y-auto p-4 custom-scrollbar">
            <h2 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4 px-2" id="materiasCount">Tópicos</h2>
            <nav id="subjectList" class="space-y-1.5 pb-20 md:pb-0"></nav>
        </div>
    </aside>
    <main class="flex-1 flex flex-col h-screen overflow-hidden bg-slate-50/50">
        <header class="h-16 bg-white border-b border-slate-200 flex items-center px-4 md:px-8 shadow-sm justify-between shrink-0">
            <div class="hidden md:flex items-center gap-2 text-sm text-slate-500 w-1/3">
                <i class="fa-solid fa-table-columns"></i>
                <span id="headerTitle" class="truncate font-medium"></span>
            </div>
            <div class="flex bg-slate-100 p-1 rounded-xl w-full md:w-auto justify-center shrink-0">
                <button id="tabMap" class="flex items-center gap-2 px-4 md:px-6 py-1.5 rounded-lg text-sm font-semibold transition-all bg-white text-slate-800 shadow-sm">
                    <i class="fa-solid fa-book"></i>
                    <span class="hidden sm:inline">Mapa Mental</span>
                    <span class="sm:hidden">Teoria</span>
                </button>
                <button id="tabQuiz" class="flex items-center gap-2 px-4 md:px-6 py-1.5 rounded-lg text-sm font-semibold transition-all text-slate-500 hover:text-slate-700">
                    <i class="fa-solid fa-pen-nib"></i>
                    <span class="hidden sm:inline">Questões Práticas</span>
                    <span class="sm:hidden">Questões</span>
                </button>
            </div>
            <div class="w-1/3 hidden md:block"></div>
        </header>
        <div class="flex-1 overflow-auto p-4 md:p-8 relative bg-grid-pattern">
            <div id="mapContainer" class="max-w-5xl mx-auto pb-20 md:pb-12 fade-in"></div>
            <div id="quizContainer" class="hidden h-full fade-in pb-20"></div>
        </div>
    </main>
    <script>
        const mindMapData = [
            { id: 'lei_seguranca_publica', title: 'Lei da Seguranca Publica', color: 'bg-purple-500', nodes: [
                { title: 'Principios fundamentais', content: 'Respeito aos direitos humanos, protecao.' },
                { title: 'Responsabilidades', content: 'Policia Federal, Civil, Militar e Bombeiros.' },
                { title: 'Funções de policia', content: 'Prevencao, investigacao e repressao.' }
            ]},
            { id: 'codigo_ethica_profissional', title: 'Codigo de Ethica Profissional', color: 'bg-pink-500', nodes: [
                { title: 'Deveres dos policiais', content: 'Respeitar leis, proteger vidas, manter ordem.' },
                { title: 'Proibicoes', content: 'Tortura, discriminacao, abuso de autoridade.' },
                { title: 'Responsabilidade', content: 'Pela propria conducao e atos.' }
            ]},
            { id: 'lei_uso_forca', title: 'Lei sobre Uso da Forca', color: 'bg-red-500', nodes: [
                { title: 'Principios', content: 'Necessidade, proporcionalidade, legalidade.' },
                { title: 'Circunstancias', content: 'Legítima defesa, estado de necessidade, cumprimento legal.' },
                { title: 'Limites', content: 'Não ultrapassar o necessario, proteger inocentes.' }
            ]},
            { id: 'direito_administrativo_policial', title: 'Direito Administrativo Policial', color: 'bg-violet-500', nodes: [
                { title: 'Procedimentos administrativos', content: 'Disciplina policial, sumarios, sindicancia.' },
                { title: 'Punicoes disciplinares', content: 'Advertencia, suspensao, demissao.' },
                { title: 'Recursos', content: 'Direito de defesa, recursos adminis.' }
            ]},
            { id: 'direitos_humanos_policia', title: 'Direitos Humanos na Policia', color: 'bg-blue-500', nodes: [
                { title: 'Respeito digidade', content: 'De todas as pessoas sob funções policiais.' },
                { title: 'Proibicao tortura', content: 'Vedacao de qualquer forma de violencia.' },
                { title: 'Transparencia', content: 'Accountability, investigacao de abusos.' }
            ]}
        ];
        const questionsData = [
            { id: 1, subjectId: 'lei_seguranca_publica', text: 'Qual e um dos principios fundamentais da Lei de Seguranca Publica?', options: ['Violencia', 'Arbitrariedade', 'Respeito aos direitos humanos', 'Discriminacao'], correctAnswer: 2, explanation: 'Correto! O respeito aos direitos humanos e um principio fundmental da Lei de Seguranca Publica.' },
            { id: 2, subjectId: 'lei_uso_forca', text: 'Qual principio guia o uso de forca pela policia?', options: ['Maxima violencia', 'Legalidade e proporcionalidade', 'Arbitrio total', 'Sem limites'], correctAnswer: 1, explanation: 'Correto! O uso de forca deve seguir os principios de legalidade, necessidade e proporcionalidade.' }
        ];

        StudyMapApp.init({
            mindMapData,
            questionsData,
            countLabel: (document.getElementById("materiasCount")?.textContent || "Topicos").trim()
        });
    </script>
</body>
</html>
