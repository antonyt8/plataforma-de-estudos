<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Direitos Humanos - Mapas & Questões</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="../assets/js/study-map-app.js"></script>
<style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }
        details > summary { list-style: none; }
        details > summary::-webkit-details-marker { display: none; }
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .bg-grid-pattern { background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 32px 32px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 overflow-hidden h-screen flex">
    <button id="mobileOpenBtn" class="md:hidden fixed bottom-6 right-6 z-50 bg-cyan-600 text-white p-4 rounded-full shadow-xl hover:bg-cyan-700 transition-colors">
        <i class="fa-solid fa-bars text-xl"></i>
    </button>
    <aside id="sidebar" class="fixed md:static inset-y-0 left-0 z-40 w-72 bg-white border-r border-slate-200 flex flex-col transition-transform duration-300 ease-in-out shadow-2xl md:shadow-none -translate-x-full md:translate-x-0">
        <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-cyan-900 text-white shrink-0">
            <div>
                <h1 class="text-xl font-bold flex items-center gap-2">
                    <i class="fa-solid fa-heart text-cyan-300"></i>
                    Direitos Humanos
                </h1>
                <p class="text-xs text-cyan-200 mt-1 font-medium">Mapas & Questões</p>
            </div>
            <button id="mobileCloseBtn" class="md:hidden text-cyan-200 hover:text-white">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>
        </div>
        <div class="p-4 border-b border-slate-100 shrink-0">
            <a href="../index.html" class="text-sm text-cyan-600 hover:text-cyan-800 font-semibold mb-3 inline-block">
                <i class="fa-solid fa-arrow-left"></i> Voltar
            </a>
            <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" id="searchInput" placeholder="Procurar assunto..." class="w-full pl-9 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:bg-white transition-colors">
            </div>
        </div>
        <div class="flex-1 overflow-y-auto p-4 custom-scrollbar">
            <h2 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4 px-2" id="materiasCount">Tópicos</h2>
            <nav id="subjectList" class="space-y-1.5 pb-20 md:pb-0"></nav>
        </div>
    </aside>
    <main class="flex-1 flex flex-col h-screen overflow-hidden bg-slate-50/50">
        <header class="h-16 bg-white border-b border-slate-200 flex items-center px-4 md:px-8 shadow-sm justify-between shrink-0">
            <div class="hidden md:flex items-center gap-2 text-sm text-slate-500 w-1/3">
                <i class="fa-solid fa-table-columns"></i>
                <span id="headerTitle" class="truncate font-medium"></span>
            </div>
            <div class="flex bg-slate-100 p-1 rounded-xl w-full md:w-auto justify-center shrink-0">
                <button id="tabMap" class="flex items-center gap-2 px-4 md:px-6 py-1.5 rounded-lg text-sm font-semibold transition-all bg-white text-slate-800 shadow-sm">
                    <i class="fa-solid fa-book"></i>
                    <span class="hidden sm:inline">Mapa Mental</span>
                    <span class="sm:hidden">Teoria</span>
                </button>
                <button id="tabQuiz" class="flex items-center gap-2 px-4 md:px-6 py-1.5 rounded-lg text-sm font-semibold transition-all text-slate-500 hover:text-slate-700">
                    <i class="fa-solid fa-pen-nib"></i>
                    <span class="hidden sm:inline">Questões Práticas</span>
                    <span class="sm:hidden">Questões</span>
                </button>
            </div>
            <div class="w-1/3 hidden md:block"></div>
        </header>
        <div class="flex-1 overflow-auto p-4 md:p-8 relative bg-grid-pattern">
            <div id="mapContainer" class="max-w-5xl mx-auto pb-20 md:pb-12 fade-in"></div>
            <div id="quizContainer" class="hidden h-full fade-in pb-20"></div>
        </div>
    </main>
    <script>
        const mindMapData = [
            { id: 'dh_declaracao_universal', title: 'Declaracao Universal de Direitos Humanos', color: 'bg-cyan-500', nodes: [
                { title: 'Artigos iniciais', content: 'Direito a vida, liberdade, seguranca pessoal.' },
                { title: 'Direitos Civis e Politicos', content: 'Igualdade, liberdade de opiniao e expressao.' },
                { title: 'Direitos Economicos e Sociais', content: 'Trabalho, educacao, condicoes dignas de vida.' }
            ]},
            { id: 'dh_principes_fundamentais', title: 'Principios Fundamentais', color: 'bg-sky-500', nodes: [
                { title: 'Dignidade da Pessoa Humana', content: 'Valor intrinseco de cada ser humano.' },
                { title: 'Igualdade e Não Discriminacao', content: 'Direitos iguais para todos, sem distincoes.' },
                { title: 'Estado de Direito', content: 'Leis aplicadas igualmente a todos.' }
            ]},
            { id: 'dh_direitos_civis', title: 'Direitos Civis e Politicos', color: 'bg-teal-500', nodes: [
                { title: 'Liberdade de Expressao', content: 'Direito a opiniao e comunicação publica.' },
                { title: 'Direito de Voto', content: 'Participacao em processos eleitorais.' },
                { title: 'Direito de Associacao', content: 'Liberdade de formar grupos e organizacoes.' }
            ]},
            { id: 'dh_direitos_sociais', title: 'Direitos Sociais e Culturais', color: 'bg-emerald-500', nodes: [
                { title: 'Direito a Educacao', content: 'Acesso ensino gratuito e de qualidade.' },
                { title: 'Direito a Saude', content: 'Assistencia medica e condicoes sanitarias.' },
                { title: 'Direito ao Trabalho', content: 'Emprego digno, remuneracao justa, condicoes seguras.' }
            ]},
            { id: 'dh_violacoes_protecao', title: 'Violacoes e Protecao', color: 'bg-blue-500', nodes: [
                { title: 'Tipos de Violacoes', content: 'Tortura, execucoes, discriminacao sistematica.' },
                { title: 'Mecanismos de Protecao', content: 'Organismos internacionais, denuncias, investigations.' },
                { title: 'Responsabilidade', content: 'Estados responsaveis por violacoes de DH.' }
            ]},
            { id: 'dh_brasil', title: 'Direitos Humanos no Brasil', color: 'bg-violet-500', nodes: [
                { title: 'Constituição de 1988', content: 'Regras de protecao basicas e direitos fundamentais.' },
                { title: 'Organismos Internacionais', content: 'Comissao IDH, Corte Internacional.' },
                { title: 'Legislação Especial', content: 'Lei contra tortura, discriminacao racial etc.' }
            ]}
        ];
        const questionsData = [
            { id: 1, subjectId: 'dh_principies_fundamentais', text: 'Qual e um dos principios fundamentais dos Direitos Humanos?', options: ['Dominacao', 'Dignidade da Pessoa Humana', 'Discriminacao', 'Desigualdade'], correctAnswer: 1, explanation: 'Correto! A dignidade da pessoa humana e um principio fundamental que reconhece o valor intrinseco de cada ser humano.' },
            { id: 2, subjectId: 'dh_direitos_civis', text: 'Qual direito permite a participacao na vida politica?', options: ['Direito ao silencio', 'Direito de voto', 'Direito ao trabalho', 'Direito a propriedade'], correctAnswer: 1, explanation: 'Correto! O direito de voto e um direito civil que permite a participacao nos processos eleitorais e na vida politica.' }
        ];

        StudyMapApp.init({
            mindMapData,
            questionsData,
            countLabel: (document.getElementById("materiasCount")?.textContent || "Topicos").trim()
        });
    </script>
</body>
</html>
