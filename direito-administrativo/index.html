<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Direito Administrativo - Mapas & Questões</title>
    <link rel="stylesheet" href="../assets/css/global.css" />
    <link rel="stylesheet" href="../assets/css/study.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="../assets/js/study-map-app.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 overflow-hidden h-screen flex">
    <button id="mobileOpenBtn" class="md:hidden fixed bottom-6 right-6 z-50 bg-indigo-600 text-white p-4 rounded-full shadow-xl hover:bg-indigo-700 transition-colors">
        <i class="fa-solid fa-bars text-xl"></i>
    </button>
    <aside id="sidebar" class="fixed md:static inset-y-0 left-0 z-40 w-72 bg-white border-r border-slate-200 flex flex-col transition-transform duration-300 ease-in-out shadow-2xl md:shadow-none -translate-x-full md:translate-x-0">
        <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-indigo-900 text-white shrink-0">
            <div>
                <h1 class="text-xl font-bold flex items-center gap-2">
                    <i class="fa-solid fa-gavel text-indigo-300"></i>
                    Direito Admin.
                </h1>
                <p class="text-xs text-indigo-200 mt-1 font-medium">Mapas & Questões</p>
            </div>
            <button id="mobileCloseBtn" class="md:hidden text-indigo-200 hover:text-white">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>
        </div>
        <div class="p-4 border-b border-slate-100 shrink-0">
            <a href="../index.html" class="text-sm text-indigo-600 hover:text-indigo-800 font-semibold mb-3 inline-block">
                <i class="fa-solid fa-arrow-left"></i> Voltar
            </a>
            <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" id="searchInput" placeholder="Procurar assunto..." class="w-full pl-9 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-colors">
            </div>
        </div>
        <div class="flex-1 overflow-y-auto p-4 custom-scrollbar">
            <h2 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4 px-2" id="materiasCount">Tópicos</h2>
            <nav id="subjectList" class="space-y-1.5 pb-20 md:pb-0"></nav>
        </div>
    </aside>
    <main class="flex-1 flex flex-col h-screen overflow-hidden bg-slate-50/50">
        <header class="h-16 bg-white border-b border-slate-200 flex items-center px-4 md:px-8 shadow-sm justify-between shrink-0">
            <div class="hidden md:flex items-center gap-2 text-sm text-slate-500 w-1/3">
                <i class="fa-solid fa-table-columns"></i>
                <span id="headerTitle" class="truncate font-medium"></span>
            </div>
            <div class="flex bg-slate-100 p-1 rounded-xl w-full md:w-auto justify-center shrink-0">
                <button id="tabMap" class="flex items-center gap-2 px-4 md:px-6 py-1.5 rounded-lg text-sm font-semibold transition-all bg-white text-slate-800 shadow-sm">
                    <i class="fa-solid fa-book"></i>
                    <span class="hidden sm:inline">Mapa Mental</span>
                    <span class="sm:hidden">Teoria</span>
                </button>
                <button id="tabQuiz" class="flex items-center gap-2 px-4 md:px-6 py-1.5 rounded-lg text-sm font-semibold transition-all text-slate-500 hover:text-slate-700">
                    <i class="fa-solid fa-pen-nib"></i>
                    <span class="hidden sm:inline">Questões Práticas</span>
                    <span class="sm:hidden">Questões</span>
                </button>
            </div>
            <div class="w-1/3 hidden md:block"></div>
        </header>
        <div class="flex-1 overflow-auto p-4 md:p-8 relative bg-grid-pattern">
            <div id="mapContainer" class="max-w-5xl mx-auto pb-20 md:pb-12 fade-in"></div>
            <div id="quizContainer" class="hidden h-full fade-in pb-20"></div>
        </div>
    </main>
    <script>
        const mindMapData = [
            { id: 'principios_adm', title: 'Principios da Administração', color: 'bg-indigo-500', nodes: [
                { title: 'Legalidade', content: 'Admin deve respeitar a lei em seus atos.' },
                { title: 'Impessoalidade', content: 'Atos sem discriminacao ou preferencias pessoais.' },
                { title: 'Moralidade', content: 'Conformidade com etica publica e boa administração.' },
                { title: 'Publicidade', content: 'Transparencia e conhecimento dos atos administrativos.' }
            ]},
            { id: 'atos_administrativos', title: 'Atos Administrativos', color: 'bg-blue-500', nodes: [
                { title: 'Conceito', content: 'Manifestacao de vontade da admin com efeitos juridicos.' },
                { title: 'Requisitos', content: 'Competencia, forma, motivo, objeto, finalidade.' },
                { title: 'Classificação', content: 'Normativos, ordinatorios, enunciativos. Hierarquicos.' }
            ]},
            { id: 'servidores_publicos', title: 'Servidores Publicos', color: 'bg-purple-500', nodes: [
                { title: 'Regimes', content: 'Estatutario, CLT, temporarios, comissionados.' },
                { title: 'Direitos e Deveres', content: 'Remuneracao, licencas, aposentadoria, obrigacoes.' },
                { title: 'Responsabilidade', content: 'Civil, penal e administrativa.' }
            ]},
            { id: 'licitacao_contrato', title: 'Licitacao e Contratos', color: 'bg-pink-500', nodes: [
                { title: 'Lei de Licitacoes', content: 'Modalidades: concorrencia, tomada de preco, convite.' },
                { title: 'Contratos Administrativos', content: 'Formacao, cumprimento, extincao de contratos.' },
                { title: 'Obrigacoes', content: 'Deveres do contratante e contratado.' }
            ]},
            { id: 'recursos_administrativos', title: 'Recursos Administrativos', color: 'bg-cyan-500', nodes: [
                { title: 'Recursos', content: 'Recurso Hierarquico, Recurso Ordinario, Especial.' },
                { title: 'Procedimento', content: 'Prazos, competencia, encaminhamento.' }
            ]}
        ];
        const questionsData = [
            { id: 1, subjectId: 'principios_adm', text: 'Qual e um dos principios fundamentais da administração publica?', options: ['Arbitrariedade', 'Legalidade', 'Pessoalidade', 'Sigilo'], correctAnswer: 1, explanation: 'Correto! O principio da legalidade garante que a administração deve respeitar as leis.' },
            { id: 2, subjectId: 'atos_administrativos', text: 'Qual e um requisito valido de um ato administrativo?', options: ['Ilegalidade', 'Competencia', 'Desonestidade', 'Nenhum'], correctAnswer: 1, explanation: 'Correto! A competencia e um dos requisitos essenciais para validar um ato administrativo.' }
        ];

        StudyMapApp.init({
            mindMapData,
            questionsData,
            countLabel: (document.getElementById("materiasCount")?.textContent || "Topicos").trim()
        });
    </script>
</body>
</html>
