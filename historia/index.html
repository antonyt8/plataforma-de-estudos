<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>História - Mapas & Questões</title>
    
      <link rel="stylesheet" href="../assets/css/theme.css" />
  <link rel="stylesheet" href="../assets/css/global.css" />
    <link rel="stylesheet" href="../assets/css/study.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="../assets/js/study-map-app.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 overflow-hidden h-screen flex">

    <button id="mobileOpenBtn" class="md:hidden fixed bottom-6 right-6 z-50 bg-yellow-600 text-white p-4 rounded-full shadow-xl hover:bg-yellow-700 transition-colors">
        <i class="fa-solid fa-bars text-xl"></i>
    </button>

    <aside id="sidebar" class="fixed md:static inset-y-0 left-0 z-40 w-72 bg-white border-r border-slate-200 flex flex-col transition-transform duration-300 ease-in-out shadow-2xl md:shadow-none -translate-x-full md:translate-x-0">
        <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-yellow-900 text-white shrink-0">
            <div>
                <h1 class="text-xl font-bold flex items-center gap-2">
                    <i class="fa-solid fa-book-open text-yellow-300"></i>
                    História
                </h1>
                <p class="text-xs text-yellow-200 mt-1 font-medium">Mapas & Questões</p>
            </div>
            <button id="mobileCloseBtn" class="md:hidden text-yellow-200 hover:text-white">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>
        </div>

        <div class="p-4 border-b border-slate-100 shrink-0">
            <a href="../index.html" class="text-sm text-yellow-600 hover:text-yellow-800 font-semibold mb-3 inline-block">
                <i class="fa-solid fa-arrow-left"></i> Voltar
            </a>
            <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" id="searchInput" placeholder="Procurar assunto..." class="w-full pl-9 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-yellow-500 focus:bg-white transition-colors">
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-4 custom-scrollbar">
            <h2 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4 px-2" id="materiasCount">
                Tópicos
            </h2>
            <nav id="subjectList" class="space-y-1.5 pb-20 md:pb-0">
            </nav>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden bg-slate-50/50">
        
        <header class="h-16 bg-white border-b border-slate-200 flex items-center px-4 md:px-8 shadow-sm justify-between shrink-0">
            <div class="hidden md:flex items-center gap-2 text-sm text-slate-500 w-1/3">
                <i class="fa-solid fa-table-columns"></i>
                <span id="headerTitle" class="truncate font-medium"></span>
            </div>

            <div class="flex bg-slate-100 p-1 rounded-xl w-full md:w-auto justify-center shrink-0">
                <button id="tabMap" class="flex items-center gap-2 px-4 md:px-6 py-1.5 rounded-lg text-sm font-semibold transition-all bg-white text-slate-800 shadow-sm">
                    <i class="fa-solid fa-book"></i>
                    <span class="hidden sm:inline">Mapa Mental</span>
                    <span class="sm:hidden">Teoria</span>
                </button>
                <button id="tabQuiz" class="flex items-center gap-2 px-4 md:px-6 py-1.5 rounded-lg text-sm font-semibold transition-all text-slate-500 hover:text-slate-700">
                    <i class="fa-solid fa-pen-nib"></i>
                    <span class="hidden sm:inline">Questões Práticas</span>
                    <span class="sm:hidden">Questões</span>
                </button>
            </div>

            <div class="w-1/3 hidden md:block"></div>
        </header>

        <div class="flex-1 overflow-auto p-4 md:p-8 relative bg-grid-pattern">
            <div id="mapContainer" class="max-w-5xl mx-auto pb-20 md:pb-12 fade-in">
            </div>

            <div id="quizContainer" class="hidden h-full fade-in pb-20">
            </div>
        </div>
    </main>

    <script>
        const mindMapData = [
            {
                id: 'historia_brasil_colonia', title: 'História do Brasil Colonial', color: 'bg-yellow-500',
                nodes: [
                    { title: 'Descobrimento do Brasil', content: '1500 - Pedro Alvares Cabral chega ao Brasil.' },
                    { title: 'Primeiros Povos', content: 'Os Indigenas: primeiros habitantes, cultura e organizacao social.' },
                    { title: 'Colonizacao Portuguesa', content: 'Estrutura administrativa, capitanias hereditarias, governo geral.' },
                    { title: 'Economia Colonial', content: 'Ciclo do Acucar, latifundio, escravidao.' }
                ]
            },
            {
                id: 'historia_brasil_imperio', title: 'História do Brasil Imperio', color: 'bg-amber-500',
                nodes: [
                    { title: 'Independencia', content: '1822 - Grito da Ypiranga, Imperador D. Pedro I.' },
                    { title: 'Primeiro Imperio', content: '1822-1831 - Governo de D. Pedro I.' },
                    { title: 'Período Regencial', content: '1831-1840 - Regencias, movimentos populares.' },
                    { title: 'Segundo Imperio', content: '1840-1889 - Governo de D. Pedro II.' }
                ]
            },
            {
                id: 'historia_brasil_republicano', title: 'História do Brasil Republicano', color: 'bg-orange-500',
                nodes: [
                    { title: 'Proclamacao da Republica', content: '1889 - Fim do imperio, inicio da republica.' },
                    { title: 'Primeira Republica', content: '1889-1930 - Republica Velha, coronelismo.' },
                    { title: 'Era Vargas', content: '1930-1945 - Getulio Vargas, Revolucao de 30.' },
                    { title: 'Republica desenvolvimentista', content: 'JK, Brasilia, desenvolvimentismo.' }
                ]
            },
            {
                id: 'historia_alagoas', title: 'História de Alagoas', color: 'bg-red-500',
                nodes: [
                    { title: 'Povos Originarios', content: 'Indigenas Caetes, Paneleiros, Tacarajus.' },
                    { title: 'Colonizacao de Alagoas', content: 'Primeira donataria a Duarte Coelho.' },
                    { title: 'Desenvolvimento Colonial', content: 'Engenhos de acucar, economia agro-exportadora.' },
                    { title: 'Alagoas Moderna', content: 'Seculos XIX e XX, desenvolvimentos retracoes.' }
                ]
            },
            {
                id: 'historia_mundial', title: 'História Geral - Eventos Mundiais', color: 'bg-rose-500',
                nodes: [
                    { title: 'Idade Antigua', content: 'Civilizacoes egípcia, grega, romana.' },
                    { title: 'Idade Media', content: 'Feudalismo, cristianismo, reinos europeus.' },
                    { title: 'Idade Moderna', content: 'Renascimento, Grandes Navegacoes, Industrializacao.' },
                    { title: 'Idade Contemporanea', content: 'Guerras Mundiais, Globalizacao.' }
                ]
            }
        ];

        const questionsData = [
            { id: 1, subjectId: 'historia_brasil_colonia', text: 'Em que ano Pedro Alvares Cabral chegou ao Brasil?', options: ['1492', '1500', '1508', '1530'], correctAnswer: 1, explanation: 'Correto! Pedro Alvares Cabral chegou ao Brasil em 1500, iniciando a historia da colonizacao portuguesa.' },
            { id: 2, subjectId: 'historia_brasil_imperio', text: 'Qual foi o grito emblematico de D. Pedro I que marcou a independencia do Brasil?', options: ['Grito da Republica', 'Grito da Ypiranga', 'Grito da Libertacao', 'Grito da Confederacao'], correctAnswer: 1, explanation: 'Correto! O "Grito da Ypiranga" foi o pronunciamento de D. Pedro I em 1822 que marcou a independencia do Brasil em relação a Portugal.' }
        ];

        StudyMapApp.init({
            mindMapData,
            questionsData,
            countLabel: (document.getElementById("materiasCount")?.textContent || "Topicos").trim()
        });
    </script>
  <script src="../assets/js/theme-manager.js"></script>
</body>
</html>
