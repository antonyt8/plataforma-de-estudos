            { id: 7, subjectId: 'sujeito', text: 'Em "Temos vagas para vendedores", o sujeito e classificado como:', options: ['Sujeito inexistente', 'Sujeito simples', 'Sujeito oculto', 'Sujeito indeterminado'], correctAnswer: 2, explanation: 'Correto! O verbo esta na 1a pessoa do plural. O sujeito e oculto: "nos".' },
            { id: 8, subjectId: 'sujeito', text: 'Em "Ha vagas para vendedores", a classificação correta e:', options: ['Sujeito simples: vagas', 'Sujeito composto', 'Sujeito indeterminado', 'Oração sem sujeito'], correctAnswer: 3, explanation: 'Correto! O verbo HAVER no sentido de existir e impessoal. Portanto, oração sem sujeito.' },
            { id: 9, subjectId: 'sujeito', text: 'Assinale a oração sem sujeito:', options: ['Julgaram improcedente a reclamacao.', 'Sobrou tempo suficiente.', 'Choveu intensamente nesse fim de semana.', 'Roubaram o carro do vizinho.'], correctAnswer: 2, explanation: 'Correto! "Choveu" (fenomeno da natureza, sentido literal) forma oração sem sujeito.' },
            { id: 10, subjectId: 'sujeito', text: 'Em "Precisa-se de funcionarios", o "se" e:', options: ['Particula apassivadora', 'Pronome reflexivo', 'Pronome indeterminador do sujeito', 'Conjunção integrante'], correctAnswer: 2, explanation: 'Correto! O verbo "precisar" e VTI. Com VTI + se, temos pronome indeterminador do sujeito.' },
            { id: 11, subjectId: 'sujeito', text: 'Em "As professoras estao em reuniao", o sujeito e:', options: ['Composto', 'Simples', 'Indeterminado', 'Inexistente'], correctAnswer: 1, explanation: 'Correto! Ha apenas um nucleo (professoras), logo sujeito simples.' },
            { id: 12, subjectId: 'sujeito', text: 'A frase "Faz muito frio em Londres" apresenta:', options: ['Sujeito simples', 'Sujeito oculto', 'Sujeito indeterminado', 'Oração sem sujeito'], correctAnswer: 3, explanation: 'Correto! O verbo FAZER indicando clima e impessoal, portanto oração sem sujeito.' },
            { id: 13, subjectId: 'sujeito', text: 'Em "A maioria dos alunos chegou atrasada", o nucleo do sujeito e:', options: ['Alunos', 'Maioria', 'Atrasada', 'Chegou'], correctAnswer: 1, explanation: 'Correto! O nucleo do sujeito e "maioria"; portanto, sujeito simples.' },
            { id: 14, subjectId: 'sujeito', text: 'Em "Anunciaram a morte do prefeito", sem contexto adicional, o sujeito e:', options: ['Oculto', 'Composto', 'Indeterminado', 'Inexistente'], correctAnswer: 2, explanation: 'Correto! Verbo na 3a pessoa do plural sem referencia contextual: sujeito indeterminado.' },
            { id: 15, subjectId: 'sujeito', text: 'Em "Ainda e cedo", temos:', options: ['Sujeito simples', 'Sujeito oculto', 'Sujeito indeterminado', 'Oração sem sujeito'], correctAnswer: 3, explanation: 'Correto! Verbo SER em expressao temporal pode ser impessoal: oração sem sujeito.' },
            { id: 16, subjectId: 'substantivo', text: 'Assinale a alternativa em que o substantivo destacado e abstrato:', options: ['pedra', 'cidade', 'amor', 'janela'], correctAnswer: 2, explanation: 'Correto! "Amor" depende de um ser para se manifestar; por isso e substantivo abstrato.' },
            { id: 17, subjectId: 'artigo_numeral', text: 'Em "Art. 10", a forma recomendada em linguagem juridica para leitura do numero e:', options: ['decimo', 'dez', 'decimo primeiro', 'um zero'], correctAnswer: 1, explanation: 'Correto! Em textos legais, usa-se ordinal até 9o e cardinal a partir de 10.' },
            { id: 18, subjectId: 'pronomes', text: 'A alternativa correta e:', options: ['Entre mim e estudar, escolho descansar.', 'Entre eu e estudar, escolho descansar.', 'Para mim fazer a prova, preciso de silencio.', 'Para eu estudou, preciso de tempo.'], correctAnswer: 1, explanation: 'Correto! Depois de preposição + infinitivo, usa-se pronome reto: "entre eu e estudar".' },
            { id: 19, subjectId: 'verbos', text: 'Em "Assisti ao filme ontem", o verbo "assistir" classifica-se como:', options: ['VTD', 'VTI', 'VI', 'VL'], correctAnswer: 1, explanation: 'Correto! No sentido de ver/presenciar, "assistir" rege preposição "a" (VTI).' },
            { id: 20, subjectId: 'concordancia_nominal', text: 'Assinale a opcao correta:', options: ['Seguem anexo os documentos.', 'Seguem anexos os documentos.', 'Segue anexas os documentos.', 'Segue anexo as planilhas.'], correctAnswer: 1, explanation: 'Correto! "Anexos" concorda com "documentos" (masculino plural).' },
            { id: 21, subjectId: 'coesao_coerencia', text: 'No trecho "Maria chegou. Ela sentou.", o termo "Ela" realiza coesao:', options: ['sequencial', 'referencial anaforica', 'referencial cataforica', 'lexical por sinonimia'], correctAnswer: 1, explanation: 'Correto! "Ela" retoma "Maria", portanto ha coesao referencial anaforica.' },
            { id: 22, subjectId: 'tipologia_textual', text: 'Um texto que apresenta tese, argumentos e tentativa de convencimento e predominantemente:', options: ['narrativo', 'descritivo', 'dissertativo-argumentativo', 'injuntivo'], correctAnswer: 2, explanation: 'Correto! Esses elementos caracterizam a dissertacao argumentativa.' },
            { id: 23, subjectId: 'interpretacao_textual', text: 'Quando a resposta esta literalmente escrita no texto, trata-se de:', options: ['inferencia', 'interpretação ampla', 'compreensao textual', 'subentendido'], correctAnswer: 2, explanation: 'Correto! Compreensao textual depende de informacao explicita no texto.' },
            { id: 24, subjectId: 'reescritura', text: 'Uma reescrita adequada deve, antes de tudo, preservar:', options: ['o tamanho do período', 'a ordem original das palavras', 'o sentido nuclear do enunciado', 'a mesma pontuacao sempre'], correctAnswer: 2, explanation: 'Correto! O criterio central e manter o sentido nuclear sem distorcao.' },
            { id: 25, subjectId: 'período', text: 'A frase "Quando o edital saiu, os candidatos comemoraram" e um período:', options: ['simples', 'composto por coordenacao', 'composto por subordinacao', 'sem oração principal'], correctAnswer: 2, explanation: 'Correto! Ha subordinada temporal e oração principal, logo período composto por subordinacao.' },
            { id: 26, subjectId: 'oracoes_subordinadas_adverbiais', text: 'Em "Embora cansado, ele continuou estudando", a oração subordinada adverbial e:', options: ['causal', 'concessiva', 'consecutiva', 'final'], correctAnswer: 1, explanation: 'Correto! "Embora" introduz ideia de concessão.' },
            { id: 27, subjectId: 'oracoes_adjetivas', text: 'Em "Os alunos que estudam passam", a oração destacada e:', options: ['adjetiva explicativa', 'substantiva objetiva', 'adjetiva restritiva', 'adverbial causal'], correctAnswer: 2, explanation: 'Correto! Sem virgula e com restricao do referente: adjetiva restritiva.' },
            { id: 28, subjectId: 'complementos_verbais', text: 'Em "Entreguei o recurso ao fiscal", temos:', options: ['apenas OD', 'apenas OI', 'OD e OI', 'predicativo e aposto'], correctAnswer: 2, explanation: 'Correto! "o recurso" = OD e "ao fiscal" = OI (verbo VTDI).' },
            { id: 29, subjectId: 'adjetivo', text: 'A forma "belissimo" e classificada como:', options: ['comparativo de igualdade', 'superlativo absoluto sintetico', 'superlativo relativo', 'comparativo de superioridade'], correctAnswer: 1, explanation: 'Correto! "Belissimo" e superlativo absoluto sintetico.' },
            { id: 30, subjectId: 'adverbio_interjeicao', text: 'Em "Ele fala muito bem", a palavra "muito" modifica:', options: ['o substantivo', 'o adverbio', 'a interjeição', 'o sujeito'], correctAnswer: 1, explanation: 'Correto! "bem" e adverbio, e "muito" intensifica esse adverbio.' },
            { id: 31, subjectId: 'preposição', text: 'Em "Morreu de fome", o valor da preposição "de" e:', options: ['companhia', 'causa', 'destino', 'oposicao'], correctAnswer: 1, explanation: 'Correto! A preposição indica causa na expressao.' },
            { id: 32, subjectId: 'vozes_verbais', text: 'A forma passiva analitica de "A banca corrigiu as provas" e:', options: ['Corrigiram-se as provas pela banca.', 'As provas foram corrigidas pela banca.', 'As provas corrigem pela banca.', 'Corrigiu-se as provas.'], correctAnswer: 1, explanation: 'Correto! Estrutura da passiva analitica: SER + participio + agente da passiva.' },
            { id: 33, subjectId: 'colocacao_pronominal', text: 'A frase correta, segundo a norma-padrao, e:', options: ['Me disseram a verdade.', 'Disseram-me a verdade.', 'Disseram a verdade-me.', 'Me disseram-me a verdade.'], correctAnswer: 1, explanation: 'Correto! Em inicio de período formal, prefere-se enclise: "Disseram-me".' },
            { id: 34, subjectId: 'pontuacao', text: 'Assinale a frase corretamente pontuada:', options: ['O candidato, estudou muito.', 'O candidato estudou, muito.', 'O candidato estudou muito.', 'O, candidato estudou muito.'], correctAnswer: 2, explanation: 'Correto! Não se separa sujeito de verbo por virgula.' },
            { id: 35, subjectId: 'valores_do_que', text: 'Em "Sei que ele vira", o "que" e:', options: ['pronome relativo', 'conjunção integrante', 'preposição', 'interjeição'], correctAnswer: 1, explanation: 'Correto! Introduz oração substantiva objetiva direta; logo, conjunção integrante.' },
            { id: 36, subjectId: 'fonetica', text: 'A palavra "saude" apresenta:', options: ['ditongo', 'tritongo', 'hiato', 'digrafo consonantal'], correctAnswer: 2, explanation: 'Correto! "sa-u-de" tem encontro de vogais em silabas diferentes, caracterizando hiato.' },
            { id: 37, subjectId: 'roteiro_assuntos', text: 'Em questao de reescritura, o criterio principal para considerar uma alternativa correta e:', options: ['manter a mesma ordem de palavras', 'manter o mesmo numero de linhas', 'preservar o sentido nuclear do enunciado', 'manter toda pontuacao original'], correctAnswer: 2, explanation: 'Correto! A reescrita pode mudar estrutura, mas deve preservar o sentido central.' },
            { id: 38, subjectId: 'roteiro_assuntos', text: 'A oposicao "texto coeso, porem incoerente" significa que:', options: ['não ha conectivos', 'ha conexao formal, mas o sentido global falha', 'o texto esta sem pontuacao', 'o texto e apenas narrativo'], correctAnswer: 1, explanation: 'Correto! Coesao trata da forma de conexao; coerencia, da logica e do sentido global.' },
            { id: 39, subjectId: 'roteiro_assuntos', text: 'Em "Para eu estudar, preciso de silencio", a escolha de "eu" (e não "mim") ocorre porque:', options: ['eu e mais formal', 'ha verbo no infinitivo ligado ao pronome', 'mim não existe na norma culta', 'o pronome esta após preposição simples'], correctAnswer: 1, explanation: 'Correto! Quando o pronome funciona como sujeito de infinitivo, usa-se forma reta.' },
