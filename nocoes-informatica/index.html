<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informática - Mapas & Questões</title>
    
      <link rel="stylesheet" href="../assets/css/theme.css" />
  <link rel="stylesheet" href="../assets/css/global.css" />
    <link rel="stylesheet" href="../assets/css/study.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="../assets/js/study-map-app.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 overflow-hidden h-screen flex">

    <button id="mobileOpenBtn" class="md:hidden fixed bottom-6 right-6 z-50 bg-blue-600 text-white p-4 rounded-full shadow-xl hover:bg-blue-700 transition-colors">
        <i class="fa-solid fa-bars text-xl"></i>
    </button>

    <aside id="sidebar" class="fixed md:static inset-y-0 left-0 z-40 w-72 bg-white border-r border-slate-200 flex flex-col transition-transform duration-300 ease-in-out shadow-2xl md:shadow-none -translate-x-full md:translate-x-0">
        <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-blue-900 text-white shrink-0">
            <div>
                <h1 class="text-xl font-bold flex items-center gap-2">
                    <i class="fa-solid fa-computer text-blue-300"></i>
                    Informática
                </h1>
                <p class="text-xs text-blue-200 mt-1 font-medium">Mapas & Questões</p>
            </div>
            <button id="mobileCloseBtn" class="md:hidden text-blue-200 hover:text-white">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>
        </div>

        <div class="p-4 border-b border-slate-100 shrink-0">
            <a href="../index.html" class="text-sm text-blue-600 hover:text-blue-800 font-semibold mb-3 inline-block">
                <i class="fa-solid fa-arrow-left"></i> Voltar
            </a>
            <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" id="searchInput" placeholder="Procurar assunto..." class="w-full pl-9 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-colors">
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-4 custom-scrollbar">
            <h2 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4 px-2" id="materiasCount">
                Tópicos
            </h2>
            <nav id="subjectList" class="space-y-1.5 pb-20 md:pb-0">
            </nav>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden bg-slate-50/50">
        
        <header class="h-16 bg-white border-b border-slate-200 flex items-center px-4 md:px-8 shadow-sm justify-between shrink-0">
            <div class="hidden md:flex items-center gap-2 text-sm text-slate-500 w-1/3">
                <i class="fa-solid fa-table-columns"></i>
                <span id="headerTitle" class="truncate font-medium"></span>
            </div>

            <div class="flex bg-slate-100 p-1 rounded-xl w-full md:w-auto justify-center shrink-0">
                <button id="tabMap" class="flex items-center gap-2 px-4 md:px-6 py-1.5 rounded-lg text-sm font-semibold transition-all bg-white text-slate-800 shadow-sm">
                    <i class="fa-solid fa-book"></i>
                    <span class="hidden sm:inline">Mapa Mental</span>
                    <span class="sm:hidden">Teoria</span>
                </button>
                <button id="tabQuiz" class="flex items-center gap-2 px-4 md:px-6 py-1.5 rounded-lg text-sm font-semibold transition-all text-slate-500 hover:text-slate-700">
                    <i class="fa-solid fa-pen-nib"></i>
                    <span class="hidden sm:inline">Questões Práticas</span>
                    <span class="sm:hidden">Questões</span>
                </button>
            </div>

            <div class="w-1/3 hidden md:block"></div>
        </header>

        <div class="flex-1 overflow-auto p-4 md:p-8 relative bg-grid-pattern">
            <div id="mapContainer" class="max-w-5xl mx-auto pb-20 md:pb-12 fade-in">
            </div>

            <div id="quizContainer" class="hidden h-full fade-in pb-20">
            </div>
        </div>
    </main>

    <script>
        const mindMapData = [
            {
                id: 'sistemas_operacionais', title: 'Sistemas Operacionais', color: 'bg-blue-500',
                nodes: [
                    { title: 'Conceito', content: 'Programa que gerencia os recursos do computador e permite a comunicação com o usuario.' },
                    { title: 'Windows', content: 'Sistema operacional desenvolvido pela Microsoft.' },
                    { title: 'macOS', content: 'Sistema operacional da Apple para computadores Macintosh.' },
                    { title: 'Linux', content: 'Sistema operacional de codigo aberto.' }
                ]
            },
            {
                id: 'internet_web', title: 'Internet e Web', color: 'bg-cyan-500',
                nodes: [
                    { title: 'Internet', content: 'Rede global de computadores conectados.' },
                    { title: 'WWW (World Wide Web)', content: 'Sistema de documentos interligados acessados via internet.' },
                    { title: 'Navegadores', content: 'Programas para acessar e visualizar paginas da web (Chrome, Firefox, Safari).' },
                    { title: 'URL', content: 'Endereco internet de um recurso - Uniform Resource Locator.' }
                ]
            },
            {
                id: 'seguranca_dados', title: 'Seguranca e Protecao de Dados', color: 'bg-indigo-500',
                nodes: [
                    { title: 'Virus e Malware', content: 'Programas maliciosos que prejudicam o computador.' },
                    { title: 'Firewall', content: 'Sistema que controla e monitora o trafego de dados.' },
                    { title: 'Antivirus', content: 'Software que detecta e remove virus do sistema.' },
                    { title: 'Criptografia', content: 'Metodo de protecao de dados atraves de codificacao.' }
                ]
            },
            {
                id: 'aplicacoes_software', title: 'Aplicacoes e Software', color: 'bg-purple-500',
                nodes: [
                    { title: 'Processadores de Texto', content: 'Softwares para criar e editar documentos (Word, LibreOffice).' },
                    { title: 'Planilhas Eletronicas', content: 'Softwares para calculos e analise de dados (Excel, Calc).' },
                    { title: 'Apresentacoes', content: 'Softwares para criar slides (PowerPoint, Impress).' },
                    { title: 'Email', content: 'Sistema de comunicação por mensagens eletronicas.' }
                ]
            },
            {
                id: 'hardware', title: 'Hardware - Componentes', color: 'bg-violet-500',
                nodes: [
                    { title: 'Processador (CPU)', content: 'Componente central que executa as instrucoes do computador.' },
                    { title: 'Memoria RAM', content: 'Memoria de acesso rapido para armazenamento temporario de dados.' },
                    { title: 'Disco Rigido/SSD', content: 'Dispositivos de armazenamento permanente de dados.' },
                    { title: 'Placa Mae', content: 'Componente principal que conecta todos os outros componentes.' }
                ]
            },
            {
                id: 'redes_comunicacao', title: 'Redes de Computadores', color: 'bg-fuchsia-500',
                nodes: [
                    { title: 'LAN', content: 'Rede Local - conecta computadores em una area pequena.' },
                    { title: 'WAN', content: 'Rede Geografica - conecta redes distanciadas geograficamente.' },
                    { title: 'IP (Protocolo Internet)', content: 'Protocolo fundamental da internet para enderecamento.' },
                    { title: 'DNS', content: 'Domain Name System - traduz nomes de dominios em endericos IP.' }
                ]
            }
        ];

        const questionsData = [
            { id: 1, subjectId: 'sistemas_operacionais', text: 'Qual e o sistema operacional mais utilizado em computadores pessoais?', options: ['macOS', 'Windows', 'Linux', 'Android'], correctAnswer: 1, explanation: 'Correto! Windows e o sistema operacional mais utilizado em computadores pessoais, com uma larga percentagem do mercado.' },
            { id: 2, subjectId: 'seguranca_dados', text: 'O que e um firewall?', options: ['Anti-virus que remove virus', 'Sistema que controla o trafego de dados', 'Programa para navegar a internet', 'Dispositivo de armazenamento'], correctAnswer: 1, explanation: 'Correto! Um firewall e um sistema que monitora e controla o trafego de dados entre redes, protegendo contra acessos não autorizados.' }
        ];

        StudyMapApp.init({
            mindMapData,
            questionsData,
            countLabel: (document.getElementById("materiasCount")?.textContent || "Topicos").trim()
        });
    </script>
  <script src="../assets/js/theme-manager.js"></script>
</body>
</html>
