                                <div class="bg-gradient-to-r from-amber-50 to-orange-50 p-4 rounded border-l-4 border-amber-600">
                                    <h4 class="font-bold text-slate-900 mb-2">2. Proposta para PM (Polícia Militar)</h4>
                                    <p class="text-slate-700 text-sm mb-2"><strong>Foco:</strong> Ordem pública, prevenção, patrulhamento, segurança comunitária, função social</p>
                                    <div class="bg-white p-3 rounded mt-2 text-slate-600 text-xs">
                                        <p><strong>Tópicos frequentes:</strong></p>
                                        <p>• PM como instituição preventiva, não apenas repressiva</p>
                                        <p>• Relação com comunidade e confiança pública</p>
                                        <p>• Patrulhamento inteligente e efetivo</p>
                                        <p>• Treinamento e ética na corporação</p>
                                    </div>
                                </div>

                                <div class="bg-gradient-to-r from-red-50 to-rose-50 p-4 rounded border-l-4 border-red-600">
                                    <h4 class="font-bold text-slate-900 mb-2">3. Proposta para PP (Polícia Penal)</h4>
                                    <p class="text-slate-700 text-sm mb-2"><strong>Foco:</strong> Sistema penitenciário, execução penal, ressocialização, segurança nas unidades</p>
                                    <div class="bg-white p-3 rounded mt-2 text-slate-600 text-xs">
                                        <p><strong>Tópicos frequentes:</strong></p>
                                        <p>• Segurança nas penitenciárias</p>
                                        <p>• Ressocialização e reabilitação</p>
                                        <p>• Direitos das pessoas encarceradas</p>
                                        <p>• Condições carcerárias e humanidade</p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="bg-white rounded-lg p-6 border-l-4 border-purple-500">
                            <h3 class="font-bold text-lg text-slate-900 mb-3">Composição Padrão da Redação</h3>
                            <p class="text-slate-700 mb-4">Cada proposta segue uma estrutura padrão:</p>
                            <ul class="space-y-2 text-slate-700 text-sm">
                                <li><i class="fa-solid fa-file-lines text-purple-600 mr-2"></i><strong>Textos de Apoio:</strong> Geralmente 2-4 textos para leitura obrigatória</li>
                                <li><i class="fa-solid fa-tasks text-purple-600 mr-2"></i><strong>Roteiro Específico:</strong> Lista de tópicos que DEVEM ser abordados (imperativamente)</li>
                                <li><i class="fa-solid fa-pen text-purple-600 mr-2"></i><strong>Limite de Linhas:</strong> Geralmente entre 25-30 linhas de redação</li>
                                <li><i class="fa-solid fa-check-double text-purple-600 mr-2"></i><strong>Avaliação de Conteúdo:</strong> O foco principal (90-95% da nota)</li>
                                <li><i class="fa-solid fa-file text-purple-600 mr-2"></i><strong>Folha de Redação:</strong> Folha própria para escrita final (em caligrafia legível)</li>
                            </ul>
                        </div>

                        <div class="bg-white rounded-lg p-6 border-l-4 border-indigo-500">
                            <h3 class="font-bold text-lg text-slate-900 mb-3">Como Abordar Cada Proposta</h3>
                            <div class="space-y-3 text-slate-700 text-sm">
                                <div class="bg-indigo-50 p-3 rounded">
                                    <strong>Passo 1 - Leia Tudo:</strong> Textos de apoio, roteiro, proposição. Não se apresse.
                                </div>
                                <div class="bg-indigo-50 p-3 rounded">
                                    <strong>Passo 2 - Identifique Tópicos:</strong> Quantos pontos você deve abordar? 3? 4? 5?
                                </div>
                                <div class="bg-indigo-50 p-3 rounded">
                                    <strong>Passo 3 - Extraia do Texto:</strong> Que informações nos textos você pode usar em cada tópico?
                                </div>
                                <div class="bg-indigo-50 p-3 rounded">
                                    <strong>Passo 4 - Esquematize:</strong> Faça seu esqueleto antes de escrever
                                </div>
                                <div class="bg-indigo-50 p-3 rounded">
                                    <strong>Passo 5 - Desenvolva:</strong> Escreva respeitando rigidamente o roteiro
                                </div>
                            </div>
                        </div>

                        <div class="bg-white rounded-lg p-6 border-l-4 border-orange-500">
                            <h3 class="font-bold text-lg text-slate-900 mb-3">Erros Fatais em Propostas</h3>
                            <ul class="space-y-2 text-slate-700 text-sm">
                                <li>❌ <strong>Não ler os textos:</strong> Perderá informações e argumentos</li>
                                <li>❌ <strong>Desviar do roteiro:</strong> Custo mínimo de 30% da nota perdida</li>
                                <li>❌ <strong>Abordar 2 tópicos quando solicitava 3:</strong> Incompleto automaticamente</li>
                                <li>❌ <strong>Copiar literalmente dos textos:</strong> É plágio parcial, penalizado</li>
                                <li>❌ <strong>Falar sobre instituição errada:</strong> Se é PC, não fale de PM</li>
                            </ul>
                        </div>

                        <div class="bg-pink-50 border border-pink-200 rounded-lg p-6">
                            <h3 class="font-bold text-slate-900 mb-2">📋 Dica Ouro</h3>
                            <p class="text-slate-700 text-sm mb-3">Sempre responda ao roteiro proposto. Não fuja dos tópicos solicitados - isso resultará em perda significativa de pontos.</p>
                            <p class="text-slate-700 text-sm mb-3">Leia os textos de apoio com atenção e use-os como embasamento para suas argumentações. Eles não são decorativos.</p>
                            <p class="text-slate-700 text-sm"><strong>Tempo de leitura:</strong> Dedique os primeiros 5-7 minutos apenas livremente o material. Vale a pena!</p>
                        </div>
                    </div>
                `
            }
        ];

        // Data tips
        const tips = {
            'desenvolvimento': [
                { title: 'Tópico Frasal', desc: 'Inicie cada parágrafo com a ideia central clara' },
                { title: 'Evidências', desc: 'Sempre sustente com exemplos, dados ou referências' },
                { title: 'Coesão', desc: 'Use conectivos para ligar desenvolvimentos' }
            ],
            'conclusao': [
                { title: 'Retome a Tese', desc: 'Reafirme sua posição inicial de forma sintética' },
                { title: 'Sintetize', desc: 'Resuma sem repetir literalmente o desenvolvimento' },
                { title: 'Proponha', desc: 'Termine com soluções ou perspectivas futuras' }
            ],
            'textos-referencia': [
                { title: 'Não é Decorativo', desc: 'Textos de apoio devem fundamentar seus argumentos' },
                { title: 'Leitura Estratégica', desc: 'Destaque ideias-chave e dados utilizáveis' },
                { title: 'Sem Plágio', desc: 'Reescreva com suas palavras, parafraseie ideias' }
            ],
            'conectivos': [
                { title: 'Função Clara', desc: 'Cada conectivo tem um propósito - use corretamente' },
                { title: 'Sem Excesso', desc: 'Máximo um conectivo a cada 2-3 sentenças' },
                { title: 'Coesão Garantida', desc: 'Conectivos bem usados melhoram fluidez do texto' }
            ],
            'folha-redacao': [
                { title: 'Letra Legível', desc: 'Avaliador precisa ler facilmente - letra clara' },
                { title: 'Sem Rasuras', desc: 'Um traço fino ok, mas evite borrões e manchas' },
                { title: 'Distribuição', desc: 'Planeje o espaço para caber confortavelmente' }
            ],
            'pontuacao-avancada': [
                { title: 'Cada Sinal = Função', desc: 'Pontuação tem papel semântico específico' },
                { title: 'Ponto e Vírgula é Chave', desc: 'Mostra domínio sintático impressionante' },
                { title: 'Não Abuse', desc: 'Parênteses e reticências com moderação' }
            ],
            'nocoes-gerais': [
                { title: 'Conteúdo vs. Gramática', desc: '90-95% da nota é baseada em conteúdo na CESP' },
                { title: 'Roteiro Específico', desc: 'Sempre há um roteiro a ser seguido, diferente de outras bancas' },
                { title: 'Banca Atípica', desc: 'CESP tem cobranças e correção diferentes das demais' }
            ],
            'introducao': [
                { title: 'Abertura Impactante', desc: 'A introdução deve contextualizar sem ser genérica' },
                { title: 'Tese Clara', desc: 'Deixe claro qual será sua abordagem dos tópicos' },
                { title: 'Evitar Chavões', desc: 'Não abra com frases como "A educação é importante"' }
            ],
            'regras-escrita': [
                { title: 'Regência Verbal', desc: 'Memorize verbos problemáticos como "corroborar"' },
                { title: 'Onde vs. Em que', desc: 'Use "onde" para lugar físico, "em que" para situações' },
                { title: 'Pontuação com Função', desc: 'Cada sinal de pontuação tem seu propósito específico' }
            ],
            'esqueletos': [
                { title: 'Planeje Antes', desc: 'Um bom esqueleto economiza tempo e reduz erros' },
                { title: 'Adaptável', desc: 'Customize seu esqueleto para cada proposta específica' },
                { title: 'Coesão Garantida', desc: 'Esqueletos bem estruturados garantem textos coesos' }
            ],
            'gramatica': [
                { title: 'Conjugação Verbal', desc: 'Mantenha o tempo verbal consistente no texto' },
                { title: 'Concordância', desc: 'Sempre revise concordância nominal e verbal' },
                { title: 'Conectivos', desc: 'Use conectivos para ligar ideias de forma clara' }
            ],
            'gestao-tempo': [
                { title: 'Leitura: 3-5 min', desc: 'Tempo para entender a proposta completamente' },
                { title: 'Planejamento: 5-7 min', desc: 'Elabore seu esqueleto com cuidado' },
                { title: 'Revisão: 3-5 min', desc: 'Não pule esta etapa fundamental' }
            ],
            'propostas-redacao': [
                { title: 'Responda Roteiro', desc: 'Desviar custará pontos - é mandatório seguir' },
                { title: 'Use Textos', desc: 'Apoio não é decorativo - use para embasar argumentos' },
                { title: '5 Passos', desc: 'Leia tudo → Identifique → Extraia → Esquematize → Desenvolva' }
            ]
        };

        const searchInput = document.getElementById('searchInput');
        const topicList = document.getElementById('topicList');
        const contentContainer = document.getElementById('contentContainer');
        const tipsContainer = document.getElementById('tipsContainer');
        const headerTitle = document.getElementById('headerTitle');
        const tabContent = document.getElementById('tabContent');
        const tabTips = document.getElementById('tabTips');
        const mobileOpenBtn = document.getElementById('mobileOpenBtn');
        const mobileCloseBtn = document.getElementById('mobileCloseBtn');
        const sidebar = document.getElementById('sidebar');

        let currentSelection = null;

        function renderTopicList(filtered = false) {
            topicList.innerHTML = '';
            const query = searchInput.value.toLowerCase();
            const toShow = filtered ? topics.filter(item => item.title.toLowerCase().includes(query)) : topics;

            toShow.forEach(topic => {
                const link = document.createElement('a');
                link.href = '#';
                link.className = `block px-3 py-2.5 rounded-lg text-sm font-medium transition-all cursor-pointer a11y-focus ${
                    currentSelection === topic.id 
                        ? 'bg-red-100 text-red-700' 
                        : 'text-slate-700 hover:bg-slate-100'
                }`;
                link.setAttribute('role', 'button');
                link.setAttribute('aria-label', `Ver ${topic.title}`);
                link.innerHTML = `<i class="fa-solid ${topic.icon} mr-2"></i>${topic.title}`;
                
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    selectTopic(topic);
                    if (window.innerWidth < 768) {
                        sidebar.classList.add('-translate-x-full');
                    }
                });

                link.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        selectTopic(topic);
                    }
                });

                topicList.appendChild(link);
            });
        }

        function selectTopic(topic) {
            currentSelection = topic.id;
            headerTitle.textContent = topic.title;
            renderContent(topic);
            renderTips(topic);
            renderTopicList(!!searchInput.value);
            
            // Show content tab by default
            contentContainer.classList.remove('hidden');
            tipsContainer.classList.add('hidden');
            tabContent.classList.add('bg-white', 'text-slate-800', 'shadow-sm');
            tabContent.classList.remove('text-slate-500', 'hover:text-slate-700');
            tabTips.classList.remove('bg-white', 'text-slate-800', 'shadow-sm');
            tabTips.classList.add('text-slate-500', 'hover:text-slate-700');
        }

        function renderContent(topic) {
            contentContainer.innerHTML = topic.content;
        }

        function renderTips(topic) {
            const topicTips = tips[topic.id] || [];
            tipsContainer.innerHTML = `
                <h2 class="text-3xl font-bold text-slate-900 mb-6">Dicas Rápidas: ${topic.title}</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    ${topicTips.map((tip, idx) => `
                        <div class="bg-white rounded-lg p-6 border-l-4 border-red-500 hover:shadow-lg transition-shadow">
                            <div class="flex items-start gap-3">
                                <i class="fa-solid fa-lightbulb text-red-600 text-xl mt-1 shrink-0"></i>
                                <div>
                                    <h3 class="font-bold text-slate-900">${tip.title}</h3>
                                    <p class="text-slate-600 text-sm mt-2">${tip.desc}</p>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // Search functionality
        searchInput.addEventListener('input', (e) => {
            renderTopicList(true);
        });

        // Tab switching
        tabContent.addEventListener('click', () => {
            contentContainer.classList.remove('hidden');
            tipsContainer.classList.add('hidden');
            tabContent.classList.add('bg-white', 'text-slate-800', 'shadow-sm');
            tabContent.classList.remove('text-slate-500', 'hover:text-slate-700');
            tabTips.classList.remove('bg-white', 'text-slate-800', 'shadow-sm');
            tabTips.classList.add('text-slate-500', 'hover:text-slate-700');
        });

        tabTips.addEventListener('click', () => {
            contentContainer.classList.add('hidden');
            tipsContainer.classList.remove('hidden');
            tabTips.classList.add('bg-white', 'text-slate-800', 'shadow-sm');
            tabTips.classList.remove('text-slate-500', 'hover:text-slate-700');
            tabContent.classList.remove('bg-white', 'text-slate-800', 'shadow-sm');
            tabContent.classList.add('text-slate-500', 'hover:text-slate-700');
        });

        // Mobile menu
        mobileOpenBtn.addEventListener('click', () => {
            sidebar.classList.remove('-translate-x-full');
        });

        mobileCloseBtn.addEventListener('click', () => {
            sidebar.classList.add('-translate-x-full');
        });

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                sidebar.classList.add('-translate-x-full');
            }
        });

        // Init topic list
        renderTopicList();

        // Accessibility styles
        const style = document.createElement('style');
        style.textContent = `
            .a11y-focus:focus-visible {
                outline: 2px solid #dc2626;
                outline-offset: 2px;
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
