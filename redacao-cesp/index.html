<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redação CESP - Mapas & Questões</title>
    
    <link rel="stylesheet" href="../assets/css/global.css" />
    <link rel="stylesheet" href="../assets/css/study.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-800 overflow-hidden h-screen flex">

    <button id="mobileOpenBtn" class="md:hidden fixed bottom-6 right-6 z-50 bg-red-600 text-white p-4 rounded-full shadow-xl hover:bg-red-700 transition-colors" aria-label="Abrir menu">
        <i class="fa-solid fa-bars text-xl"></i>
    </button>

    <aside id="sidebar" class="fixed md:static inset-y-0 left-0 z-40 w-72 bg-white border-r border-slate-200 flex flex-col transition-transform duration-300 ease-in-out shadow-2xl md:shadow-none -translate-x-full md:translate-x-0">
        <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-gradient-to-r from-red-700 to-red-900 text-white shrink-0">
            <div>
                <h1 class="text-xl font-bold flex items-center gap-2">
                    <i class="fa-solid fa-feather text-red-300"></i>
                    Redação CESP
                </h1>
                <p class="text-xs text-red-200 mt-1 font-medium">Dissertação & Técnicas</p>
            </div>
            <button id="mobileCloseBtn" class="md:hidden text-red-200 hover:text-white">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>
        </div>

        <div class="p-4 border-b border-slate-100 shrink-0">
            <a href="../index.html" class="text-sm text-red-600 hover:text-red-800 font-semibold mb-3 inline-block">
                <i class="fa-solid fa-arrow-left"></i> Voltar
            </a>
            <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" id="searchInput" placeholder="Procurar tópico..." class="w-full pl-9 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-red-500 focus:bg-white transition-colors" aria-label="Procurar tópico">
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-4 custom-scrollbar">
            <h2 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4 px-2">Módulos</h2>
            <nav id="topicList" class="space-y-1.5 pb-20 md:pb-0">
            </nav>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden bg-slate-50/50">
        
        <header class="h-16 bg-white border-b border-slate-200 flex items-center px-4 md:px-8 shadow-sm justify-between shrink-0">
            <div class="hidden md:flex items-center gap-2 text-sm text-slate-500 w-1/3">
                <i class="fa-solid fa-pen-fancy"></i>
                <span id="headerTitle" class="truncate font-medium"></span>
            </div>

            <div class="flex bg-slate-100 p-1 rounded-xl w-full md:w-auto justify-center shrink-0">
                <button id="tabContent" class="flex items-center gap-2 px-4 md:px-6 py-1.5 rounded-lg text-sm font-semibold transition-all bg-white text-slate-800 shadow-sm">
                    <i class="fa-solid fa-book"></i>
                    <span class="hidden sm:inline">Conteúdo</span>
                    <span class="sm:hidden">Aula</span>
                </button>
                <button id="tabTips" class="flex items-center gap-2 px-4 md:px-6 py-1.5 rounded-lg text-sm font-semibold transition-all text-slate-500 hover:text-slate-700">
                    <i class="fa-solid fa-lightbulb"></i>
                    <span class="hidden sm:inline">Dicas</span>
                </button>
            </div>

            <div class="w-1/3 hidden md:block"></div>
        </header>

        <div class="flex-1 overflow-auto p-4 md:p-8 relative bg-grid-pattern">
            <div id="contentContainer" class="max-w-5xl mx-auto pb-20 md:pb-12 fade-in">
                <div class="text-center text-slate-500 py-12">
                    <i class="fa-solid fa-arrow-left text-4xl mb-4 opacity-50"></i>
                    <p>Escolha um tópico no menu para começar</p>
                </div>
            </div>

            <div id="tipsContainer" class="hidden max-w-5xl mx-auto pb-20 md:pb-12 fade-in">
            </div>
        </div>
    </main>

    <script>
        const topics = [
            {
                id: 'desenvolvimento',
                title: 'Desenvolvimento',
                icon: 'fa-expand',
                color: 'border-emerald-500',
                file: 'assuntos/desenvolvimento.html'
            },
            {
                id: 'conclusao',
                title: 'Conclusão',
                icon: 'fa-flag-checkered',
                color: 'border-indigo-500',
                file: 'assuntos/conclusao.html'
            },
            {
                id: 'nocoes-gerais',
                title: 'Noções Gerais',
                icon: 'fa-graduation-cap',
                color: 'border-red-500',
                file: 'assuntos/nocoes-gerais.html'
            },
            {
                id: 'introducao',
                title: 'Introdução',
                icon: 'fa-door-open',
                color: 'border-orange-500',
                file: 'assuntos/introducao.html'
            },
            {
                id: 'regras-escrita',
                title: 'Regras de Escrita',
                icon: 'fa-pen-nib',
                color: 'border-yellow-500',
                file: 'assuntos/regras-escrita.html'
            },
            {
                id: 'esqueletos',
                title: 'Esqueletos Estruturais',
                icon: 'fa-sitemap',
                color: 'border-purple-500',
                file: 'assuntos/esqueletos.html'
            },
            {
                id: 'textos-referencia',
                title: 'Textos de Referência',
                icon: 'fa-file-lines',
                color: 'border-teal-500',
                file: 'assuntos/textos-referencia.html'
            },
            {
                id: 'conectivos',
                title: 'Conectivos e Transições',
                icon: 'fa-link',
                color: 'border-orange-500',
                file: 'assuntos/conectivos.html'
            },
            {
                id: 'folha-redacao',
                title: 'Folha de Redação - Dicas Práticas',
                icon: 'fa-pen-clip',
                color: 'border-pink-500',
                file: 'assuntos/folha-redacao.html'
            },
            {
                id: 'gramatica',
                title: 'Gramática Aplicada',
                icon: 'fa-language',
                color: 'border-green-500',
                file: 'assuntos/gramatica.html'
            },
            {
                id: 'pontuacao-avancada',
                title: 'Pontuação Avançada',
                icon: 'fa-comma',
                color: 'border-slate-600',
                file: 'assuntos/pontuacao-avancada.html'
            },
            {
                id: 'gestao-tempo',
                title: 'Gestão de Tempo',
                icon: 'fa-hourglass-end',
                color: 'border-cyan-500',
                file: 'assuntos/gestao-tempo.html'
            },
            {
                id: 'propostas-redacao',
                title: 'Propostas de Redação',
                icon: 'fa-scroll',
                color: 'border-pink-500',
                file: 'assuntos/propostas-redacao.html'
            }
        ];

        // Data tips
        const tips = {
            'desenvolvimento': [
                { title: 'Tópico Frasal', desc: 'Inicie cada parágrafo com a ideia central clara' },
                { title: 'Evidências', desc: 'Sempre sustente com exemplos, dados ou referências' },
                { title: 'Coesão', desc: 'Use conectivos para ligar desenvolvimentos' }
            ],
            'conclusao': [
                { title: 'Retome a Tese', desc: 'Reafirme sua posição inicial de forma sintética' },
                { title: 'Sintetize', desc: 'Resuma sem repetir literalmente o desenvolvimento' },
                { title: 'Proponha', desc: 'Termine com soluções ou perspectivas futuras' }
            ],
            'textos-referencia': [
                { title: 'Não é Decorativo', desc: 'Textos de apoio devem fundamentar seus argumentos' },
                { title: 'Leitura Estratégica', desc: 'Destaque ideias-chave e dados utilizáveis' },
                { title: 'Sem Plágio', desc: 'Reescreva com suas palavras, parafraseie ideias' }
            ],
            'conectivos': [
                { title: 'Função Clara', desc: 'Cada conectivo tem um propósito - use corretamente' },
                { title: 'Sem Excesso', desc: 'Máximo um conectivo a cada 2-3 sentenças' },
                { title: 'Coesão Garantida', desc: 'Conectivos bem usados melhoram fluidez do texto' }
            ],
            'folha-redacao': [
                { title: 'Letra Legível', desc: 'Avaliador precisa ler facilmente - letra clara' },
                { title: 'Sem Rasuras', desc: 'Um traço fino ok, mas evite borrões e manchas' },
                { title: 'Distribuição', desc: 'Planeje o espaço para caber confortavelmente' }
            ],
            'pontuacao-avancada': [
                { title: 'Cada Sinal = Função', desc: 'Pontuação tem papel semântico específico' },
                { title: 'Ponto e Vírgula é Chave', desc: 'Mostra domínio sintático impressionante' },
                { title: 'Não Abuse', desc: 'Parênteses e reticências com moderação' }
            ],
            'nocoes-gerais': [
                { title: 'Conteúdo vs. Gramática', desc: '90-95% da nota é baseada em conteúdo na CESP' },
                { title: 'Roteiro Específico', desc: 'Sempre há um roteiro a ser seguido, diferente de outras bancas' },
                { title: 'Banca Atípica', desc: 'CESP tem cobranças e correção diferentes das demais' }
            ],
            'introducao': [
                { title: 'Abertura Impactante', desc: 'A introdução deve contextualizar sem ser genérica' },
                { title: 'Tese Clara', desc: 'Deixe claro qual será sua abordagem dos tópicos' },
                { title: 'Evitar Chavões', desc: 'Não abra com frases como "A educação é importante"' }
            ],
            'regras-escrita': [
                { title: 'Regência Verbal', desc: 'Memorize verbos problemáticos como "corroborar"' },
                { title: 'Onde vs. Em que', desc: 'Use "onde" para lugar físico, "em que" para situações' },
                { title: 'Pontuação com Função', desc: 'Cada sinal de pontuação tem seu propósito específico' }
            ],
            'esqueletos': [
                { title: 'Planeje Antes', desc: 'Um bom esqueleto economiza tempo e reduz erros' },
                { title: 'Adaptável', desc: 'Customize seu esqueleto para cada proposta específica' },
                { title: 'Coesão Garantida', desc: 'Esqueletos bem estruturados garantem textos coesos' }
            ],
            'gramatica': [
                { title: 'Conjugação Verbal', desc: 'Mantenha o tempo verbal consistente no texto' },
                { title: 'Concordância', desc: 'Sempre revise concordância nominal e verbal' },
                { title: 'Conectivos', desc: 'Use conectivos para ligar ideias de forma clara' }
            ],
            'gestao-tempo': [
                { title: 'Leitura: 3-5 min', desc: 'Tempo para entender a proposta completamente' },
                { title: 'Planejamento: 5-7 min', desc: 'Elabore seu esqueleto com cuidado' },
                { title: 'Revisão: 3-5 min', desc: 'Não pule esta etapa fundamental' }
            ],
            'propostas-redacao': [
                { title: 'Responda Roteiro', desc: 'Desviar custará pontos - é mandatório seguir' },
                { title: 'Use Textos', desc: 'Apoio não é decorativo - use para embasar argumentos' },
                { title: '5 Passos', desc: 'Leia tudo → Identifique → Extraia → Esquematize → Desenvolva' }
            ]
        };

        const searchInput = document.getElementById('searchInput');
        const topicList = document.getElementById('topicList');
        const contentContainer = document.getElementById('contentContainer');
        const tipsContainer = document.getElementById('tipsContainer');
        const headerTitle = document.getElementById('headerTitle');
        const tabContent = document.getElementById('tabContent');
        const tabTips = document.getElementById('tabTips');
        const mobileOpenBtn = document.getElementById('mobileOpenBtn');
        const mobileCloseBtn = document.getElementById('mobileCloseBtn');
        const sidebar = document.getElementById('sidebar');

        let currentSelection = null;

        function renderTopicList(filtered = false) {
            topicList.innerHTML = '';
            const query = searchInput.value.toLowerCase();
            const toShow = filtered ? topics.filter(item => item.title.toLowerCase().includes(query)) : topics;

            toShow.forEach(topic => {
                const link = document.createElement('a');
                link.href = topic.file;
                link.className = `block px-3 py-2.5 rounded-lg text-sm font-medium transition-all cursor-pointer a11y-focus ${
                    currentSelection === topic.id 
                        ? 'bg-red-100 text-red-700' 
                        : 'text-slate-700 hover:bg-slate-100'
                }`;
                link.setAttribute('role', 'button');
                link.setAttribute('aria-label', `Ver ${topic.title}`);
                link.innerHTML = `<i class="fa-solid ${topic.icon} mr-2"></i>${topic.title}`;
                
                link.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        window.location.href = topic.file;
                    }
                });

                topicList.appendChild(link);
            });
        }

        function selectTopic(topic) {
            window.location.href = topic.file;
        }

        function renderTips(topic) {
            const topicTips = tips[topic.id] || [];
            tipsContainer.innerHTML = `
                <h2 class="text-3xl font-bold text-slate-900 mb-6">Dicas Rápidas: ${topic.title}</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    ${topicTips.map((tip, idx) => `
                        <div class="bg-white rounded-lg p-6 border-l-4 border-red-500 hover:shadow-lg transition-shadow">
                            <div class="flex items-start gap-3">
                                <i class="fa-solid fa-lightbulb text-red-600 text-xl mt-1 shrink-0"></i>
                                <div>
                                    <h3 class="font-bold text-slate-900">${tip.title}</h3>
                                    <p class="text-slate-600 text-sm mt-2">${tip.desc}</p>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // Search functionality
        searchInput.addEventListener('input', (e) => {
            renderTopicList(true);
        });

        // Tab switching
        tabContent.addEventListener('click', () => {
            contentContainer.classList.remove('hidden');
            tipsContainer.classList.add('hidden');
            tabContent.classList.add('bg-white', 'text-slate-800', 'shadow-sm');
            tabContent.classList.remove('text-slate-500', 'hover:text-slate-700');
            tabTips.classList.remove('bg-white', 'text-slate-800', 'shadow-sm');
            tabTips.classList.add('text-slate-500', 'hover:text-slate-700');
        });

        tabTips.addEventListener('click', () => {
            contentContainer.classList.add('hidden');
            tipsContainer.classList.remove('hidden');
            tabTips.classList.add('bg-white', 'text-slate-800', 'shadow-sm');
            tabTips.classList.remove('text-slate-500', 'hover:text-slate-700');
            tabContent.classList.remove('bg-white', 'text-slate-800', 'shadow-sm');
            tabContent.classList.add('text-slate-500', 'hover:text-slate-700');
        });

        // Mobile menu
        mobileOpenBtn.addEventListener('click', () => {
            sidebar.classList.remove('-translate-x-full');
        });

        mobileCloseBtn.addEventListener('click', () => {
            sidebar.classList.add('-translate-x-full');
        });

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                sidebar.classList.add('-translate-x-full');
            }
        });

        // Init topic list
        renderTopicList();

        // Accessibility styles
        const style = document.createElement('style');
        style.textContent = `
            .a11y-focus:focus-visible {
                outline: 2px solid #dc2626;
                outline-offset: 2px;
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
